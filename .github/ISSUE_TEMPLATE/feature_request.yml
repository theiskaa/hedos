name: Feature request
description: Suggest an idea or improvement for Hedos
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please check [existing issues](https://github.com/theiskaa/hedos/issues) first in case it's already been raised.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the need or the friction you're hitting, not just the solution.
      placeholder: When I have the same model in two places, I can't tell…
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: How might Hedos address it? Rough is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they fall short.
    validations:
      required: false
