name: Bug report
description: Something in Hedos isn't working as it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please search [existing issues](https://github.com/theiskaa/hedos/issues) first — if an open one already covers this, add a comment there instead.

        For anything security-sensitive, do **not** file here — see [SECURITY.md](https://github.com/theiskaa/hedos/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you do, what did you expect, and what actually happened?
      placeholder: I selected a model and pressed send, and…
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Hedos
        2. …
        3. …
    validations:
      required: true
  - type: dropdown
    id: model-source
    attributes:
      label: How was the affected model installed?
      description: Hedos discovers models across the machine; where a model came from often matters.
      options:
        - Ollama
        - Hugging Face cache
        - LM Studio
        - A loose file in a folder (GGUF, safetensors, …)
        - Apple's built-in model
        - Not model-specific / not sure
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. macOS 26.1
    validations:
      required: true
  - type: input
    id: chip
    attributes:
      label: Mac chip
      placeholder: e.g. M2 Pro
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Hedos version or commit
      placeholder: e.g. commit a914895
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Screenshots, logs, or context. Drag images right into this field.
    validations:
      required: false
