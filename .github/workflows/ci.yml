name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Lets you re-run the CI manually from the Actions tab.
  workflow_dispatch:

# Cancel in-progress runs of the same workflow on the same branch when new
# commits are pushed, so rapid iteration does not queue up stale jobs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    # Both platforms hedos supports: the runtime has macOS and Linux branches,
    # so a green build on one says nothing about the other.
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace
