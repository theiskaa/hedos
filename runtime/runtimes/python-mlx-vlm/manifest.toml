id           = "python:mlx-vlm"
modalities   = ["text"]
capabilities = ["chat", "see"]
execution    = "stream"

[env]
manager  = "uv"
python   = "3.12"
lockfile = "requirements.lock"

[serve]
entrypoint = "main.py"
protocol   = "ndjson+frames"

[permissions]
network = false
paths   = ["{model}", "{workdir}"]
