id           = "python:whisper-cpp"
modalities   = ["audio"]
capabilities = ["transcribe"]
execution    = "stream"

[env]
manager  = "uv"
python   = "3.12"
lockfile = "requirements.lock"

[serve]
entrypoint = "main.py"
protocol   = "ndjson+frames"

[permissions]
network = false
paths   = ["{model}", "{workdir}"]
