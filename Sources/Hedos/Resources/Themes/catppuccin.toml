# Catppuccin — Latte light + Mocha dark.

[meta]
name = "Catppuccin"

[light.surface]
ground = "#E6E9EF"
panel = "#EFF1F5"
card = "#F7F8FB"
card2 = "#EAECF2"
line = "#CCD0DA"
line_bright = "#BCC0CC"

[light.ink]
text = "#4C4F69"
muted = "#6C6F85"
faint = "#8C8FA1"

[light.accent]
value = "#4C4F69"
dim = "#5C5F77"
on = "#EFF1F5"

[light.heat]
warm = "#DF8E1D"
error = "#D20F39"

[dark.surface]
ground = "#181825"
panel = "#1E1E2E"
card = "#262637"
card2 = "#313244"
line = "#45475A"
line_bright = "#585B70"

[dark.ink]
text = "#CDD6F4"
muted = "#A6ADC8"
faint = "#7F849C"

[dark.accent]
value = "#CDD6F4"
dim = "#BAC2DE"
on = "#181825"

[dark.heat]
warm = "#FAB387"
error = "#F38BA8"

[shape]
radius_control = 8
radius_card = 12
radius_bubble = 16
radius_artifact = 14
unit = 16
hairline = 1
