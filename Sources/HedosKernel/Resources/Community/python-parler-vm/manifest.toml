id = "python:parler-vm"
modalities = ["speech"]
capabilities = ["speak"]
execution = "sync"
detect = { file = "config.json", contains = "ParlerTTS" }

[vm]
image = "docker.io/library/python@sha256:423ed6ab25b1921a477529254bfeeabf5855151dc2c3141699a1bfc852199fbf"
setup = [
    "for i in 1 2 3 4 5; do getent hosts pypi.org && break; sleep 3; done; mkdir -p /root/piptmp; TMPDIR=/root/piptmp pip install --no-cache-dir --retries 8 --timeout 120 git+https://github.com/huggingface/parler-tts.git soundfile==0.13.1; status=$?; rm -rf /root/piptmp; exit $status",
]

[invoke]
command = "python3 {resources}/main.py --model {model} --text {prompt} --out {outputs}"

[permissions]
network = false
paths = ["{model}", "{workdir}"]
