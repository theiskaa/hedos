id           = "python:mlx-audio"
modalities   = ["speech"]
capabilities = ["speak"]
execution    = "stream"

[env]
manager  = "uv"
python   = "3.12"
lockfile = "requirements.lock"

[serve]
entrypoint = "main.py"
protocol   = "ndjson+frames"

[permissions]
network = false
paths   = ["{model}", "{workdir}"]
